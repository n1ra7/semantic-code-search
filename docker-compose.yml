# Whole pipeline, zero cloud cost. `docker compose up --build indexer` will:
#   1. start a local Qdrant (open-source, replaces Qdrant Cloud)
#   2. index the repo mounted at /workspace into it
# State (SQLite) and Qdrant storage persist in named volumes across runs, so a second
# run only re-embeds changed files.
services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  indexer:
    build: .
    depends_on:
      - qdrant
    environment:
      QDRANT_URL: http://qdrant:6333
      STATE_DB: /state/index_state.sqlite
    volumes:
      - ./:/workspace:ro   # index this repo itself out of the box; point elsewhere as needed
      - state:/state
    command: ["index", "/workspace"]

volumes:
  qdrant_data:
  state:
